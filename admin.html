<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>🏆 Painel Administrativo</h1>

    <div class="admin-grid">

        <!-- COLUNA ESQUERDA -->

        <div class="card">

            <h2>Cadastrar Pista</h2>

            <label>Número da Etapa</label>
            <input type="number" id="numero">

            <label>Título</label>
            <input type="text" id="titulo">

            <label>Enigma</label>
            <textarea id="enigma"></textarea>

            <label>Tipo de Validação</label>

            <select id="tipo">

                <option value="texto">
                    Texto
                </option>

                <option value="qr_code">
                    QR Code
                </option>

                <option value="gps">
                    GPS
                </option>

            </select>

            <label>Resposta Esperada</label>

            <input
                type="text"
                id="resposta">

            <small id="ajudaTipo">

            Palavra-chave

            </small>

            <br><br>

            <label>URL da Imagem</label>

            <input
                type="text"
                id="imagem">

            <button id="salvarPista">

                Salvar Pista

            </button>

        </div>

        <!-- COLUNA DIREITA -->

        <div class="card">

            <h2>Monitoramento</h2>

            <button id="iniciarMonitor">

                Iniciar Monitoramento

            </button>

            <br><br>

            <div id="estatisticas">

                <p>
                    Equipes:
                    <strong id="totalEquipes">
                        0
                    </strong>
                </p>

                <p>
                    Ativas:
                    <strong id="equipesAtivas">
                        0
                    </strong>
                </p>

            </div>

            <br>

            <table width="100%">

                <thead>

                <tr>

                    <th>Equipe</th>
                    <th>Etapa</th>
                    <th>Status</th>
                    <th>Ações</th>

                </tr>

                </thead>

                <tbody id="tabelaEquipes">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
