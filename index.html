<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caça ao Tesouro</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {
                "html5-qrcode": "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"
            }
        }
    </script>
</head>
<body>
    <!-- Tela de Login -->
    <div id="loginScreen" class="screen active">
        <div class="container">
            <h1>🏴‍☠️ Caça ao Tesouro</h1>
            
            <!-- STATUS DO FIREBASE COM DEBUG VISUAL -->
            <div id="firebaseStatus" style="text-align:center;padding:12px;background:#fff3cd;border-radius:8px;margin-bottom:15px;font-size:0.9em;border:2px solid #ffc107;">
                ⏳ Aguardando conexão...
            </div>
            
            <!-- LOG DE DEBUG VISUAL -->
            <div id="debugLog" style="background:#1a1a2e;color:#00ff41;padding:10px;border-radius:8px;margin-bottom:15px;font-family:monospace;font-size:11px;max-height:200px;overflow-y:auto;">
                <div id="debugContent">>> Sistema iniciado...</div>
            </div>
            
            <div id="authForm">
                <input type="email" id="emailInput" placeholder="E-mail da equipe" value="akagaipora@gmail.com">
                <input type="password" id="passwordInput" placeholder="Senha" value="123456">
                
                <div style="display:flex;gap:10px;margin:15px 0;flex-wrap:wrap;">
                    <button onclick="window.auth.login()" style="flex:1;min-width:120px;padding:14px;background:#764ba2;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">
                        🔐 Entrar
                    </button>
                    <button onclick="window.auth.register()" style="flex:1;min-width:120px;padding:14px;background:#667eea;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">
                        ✨ Criar
                    </button>
                </div>
                
                <div id="authMessage" class="message"></div>
                
                <div style="margin-top:20px;padding:12px;background:#f8f9fa;border-radius:8px;font-size:0.9em;color:#666;border-left:4px solid #764ba2;">
                    <strong>💡 Dica:</strong><br>
                    Use o email <strong>akagaipora@gmail.com</strong> que já está cadastrado.
                </div>
            </div>
        </div>
    </div>

    <!-- Tela do Jogo -->
    <div id="gameScreen" class="screen">
        <div class="container">
            <header>
                <h2 id="teamName">Equipe: ---</h2>
                <button onclick="window.auth.logout()" class="logout-btn">Sair</button>
            </header>
            
            <div id="gameContent">
                <div id="stepInfo">
                    <div class="step-badge">Etapa <span id="currentStep">1</span></div>
                    <h3 id="stepTitle">Carregando...</h3>
                </div>
                
                <div id="puzzleContent">
                    <p id="puzzleText">Carregando enigma...</p>
                    <div id="puzzleImage"></div>
                </div>

                <div id="validationArea">
                    <p style="color:#888;text-align:center;">Aguardando carregamento...</p>
                </div>

                <div id="gameMessage" class="message"></div>
            </div>
        </div>
    </div>

    <!-- Tela de Banimento -->
    <div id="bannedScreen" class="screen">
        <div class="container">
            <h1>⛔ Acesso Negado</h1>
            <p>Sua equipe foi desativada.</p>
            <button onclick="window.auth.logout()" style="width:100%;padding:14px;background:#764ba2;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">
                Sair
            </button>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    
    <!-- PRIMEIRO: Script de debug (sempre carrega) -->
    <script>
        console.log('📄 HTML carregado');
        
        // Função de log visual
        window.addDebugLog = function(msg, type = 'info') {
            const content = document.getElementById('debugContent');
            const time = new Date().toLocaleTimeString();
            const colors = {
                info: '#00ff41',
                error: '#ff4444',
                success: '#00ff88',
                warning: '#ffaa00'
            };
            content.innerHTML += `<div style="color:${colors[type] || '#00ff41'}">[${time}] ${msg}</div>`;
            content.scrollTop = content.scrollHeight;
            
            const status = document.getElementById('firebaseStatus');
            if (type === 'error') {
                status.innerHTML = '❌ ' + msg;
                status.style.background = '#f8d7da';
                status.style.color = '#721c24';
                status.style.borderColor = '#dc3545';
            } else if (type === 'success') {
                status.innerHTML = '✅ ' + msg;
                status.style.background = '#d4edda';
                status.style.color = '#155724';
                status.style.borderColor = '#28a745';
            } else {
                status.innerHTML = 'ℹ️ ' + msg;
                status.style.background = '#fff3cd';
                status.style.color = '#856404';
                status.style.borderColor = '#ffc107';
            }
        };
        
        window.addDebugLog('📄 HTML carregado', 'info');
        window.addDebugLog('⏳ Tentando carregar script.js...', 'info');
    </script>
    
    <!-- SEGUNDO: Carregar o script principal com tratamento de erro -->
    <script type="module">
        // Tentar carregar o script principal
        try {
            window.addDebugLog('🔄 Iniciando importação...', 'info');
            import('./script.js').then(() => {
                window.addDebugLog('✅ script.js carregado com sucesso!', 'success');
            }).catch((error) => {
                window.addDebugLog(`❌ Erro ao carregar script.js: ${error.message}`, 'error');
                window.addDebugLog('💡 Verifique se o arquivo script.js existe na mesma pasta', 'warning');
            });
        } catch (error) {
            window.addDebugLog(`❌ Erro crítico: ${error.message}`, 'error');
        }
    </script>
    
    <!-- TERCEIRO: Script de emergência para tentar login diretamente -->
    <script type="module">
        // Script de emergência - tenta conectar diretamente
        setTimeout(async () => {
            try {
                window.addDebugLog('🔄 Tentando conexão direta...', 'info');
                
                // Importar Firebase diretamente
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js");
                const { getAuth, signInWithEmailAndPassword, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js");
                const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
                
                // Configuração direta (SUAS CREDENCIAIS AQUI)
                const firebaseConfig = {
                    apiKey: "AIzaSyB5VC5go9c...",  // Coloque sua chave completa
                    authDomain: "cacaoatesouro-16c97.firebaseapp.com",
                    projectId: "cacaoatesouro-16c97",
                    storageBucket: "cacaoatesouro-16c97.appspot.com",
                    messagingSenderId: "642869571833",
                    appId: "1:642869571833:web:1..."
                };
                
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                
                window.addDebugLog('✅ Firebase conectado via emergência!', 'success');
                
                // Tentar login automático
                try {
                    window.addDebugLog('🔐 Tentando login automático...', 'info');
                    const userCredential = await signInWithEmailAndPassword(auth, 'akagaipora@gmail.com', '123456');
                    window.addDebugLog(`✅ Login automático bem-sucedido! UID: ${userCredential.user.uid}`, 'success');
                    
                    // Verificar documento
                    const docSnap = await getDoc(doc(db, 'jogadores', userCredential.user.uid));
                    if (docSnap.exists()) {
                        window.addDebugLog('✅ Documento do jogador encontrado!', 'success');
                        window.addDebugLog('🎮 Jogo pronto para usar!', 'success');
                    } else {
                        window.addDebugLog('⚠️ Documento não encontrado!', 'warning');
                    }
                } catch (error) {
                    window.addDebugLog(`❌ Login falhou: ${error.message}`, 'error');
                }
                
            } catch (error) {
                window.addDebugLog(`❌ Erro na conexão de emergência: ${error.message}`, 'error');
            }
        }, 2000);
    </script>
</body>
</html>
