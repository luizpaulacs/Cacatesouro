<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caça ao Tesouro</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {
                "html5-qrcode": "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"
            }
        }
    </script>
</head>
<body>
    <!-- Tela de Login -->
    <div id="loginScreen" class="screen active">
        <div class="container">
            <h1>🏴‍☠️ Caça ao Tesouro</h1>
            
            <!-- Status do Firebase -->
            <div id="firebaseStatus" style="text-align:center;padding:10px;background:#f8f9fa;border-radius:8px;margin-bottom:15px;font-size:0.9em;">
                ⏳ Carregando Firebase...
            </div>
            
            <div id="authForm">
                <input type="email" id="emailInput" placeholder="E-mail da equipe" required>
                <input type="password" id="passwordInput" placeholder="Senha (mínimo 6 caracteres)" required minlength="6">
                
                <div style="display:flex;gap:10px;margin:15px 0;">
                    <button onclick="window.auth.login()" style="flex:1;padding:14px;background:#764ba2;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">
                        🔐 Entrar
                    </button>
                    <button onclick="window.auth.register()" style="flex:1;padding:14px;background:#667eea;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">
                        ✨ Criar Equipe
                    </button>
                </div>
                
                <div id="authMessage" class="message"></div>
                
                <div style="margin-top:20px;padding:12px;background:#f8f9fa;border-radius:8px;font-size:0.9em;color:#666;border-left:4px solid #764ba2;">
                    <strong>💡 Dica:</strong><br>
                    Use o email <strong>akagaipora@gmail.com</strong> que já está cadastrado.
                </div>
            </div>
        </div>
    </div>

    <!-- Tela do Jogo -->
    <div id="gameScreen" class="screen">
        <div class="container">
            <header>
                <h2 id="teamName">Equipe: ---</h2>
                <button onclick="window.auth.logout()" class="logout-btn">Sair</button>
            </header>
            
            <div id="gameContent">
                <div id="stepInfo">
                    <div class="step-badge">Etapa <span id="currentStep">1</span></div>
                    <h3 id="stepTitle">Carregando...</h3>
                </div>
                
                <div id="puzzleContent">
                    <p id="puzzleText">Carregando enigma...</p>
                    <div id="puzzleImage"></div>
                </div>

                <div id="validationArea">
                    <!-- Renderizado dinamicamente -->
                </div>

                <div id="gameMessage" class="message"></div>
            </div>
        </div>
    </div>

    <!-- Tela de Banimento -->
    <div id="bannedScreen" class="screen">
        <div class="container">
            <h1>⛔ Acesso Negado</h1>
            <p>Sua equipe foi desativada.</p>
            <button onclick="window.auth.logout()" style="width:100%;padding:14px;background:#764ba2;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">
                Sair
            </button>
        </div>
    </div>

    <!-- CARREGAR O SCRIPT -->
    <script src="script.js" type="module"></script>
    
    <!-- Script de verificação -->
    <script>
        console.log('📄 index.html carregado');
        
        // Verificar se o módulo carregou
        setTimeout(() => {
            const status = document.getElementById('firebaseStatus');
            if (window.auth) {
                console.log('✅ window.auth disponível!');
                status.innerHTML = '✅ Firebase conectado! Pronto para jogar.';
                status.style.background = '#d4edda';
                status.style.color = '#155724';
            } else {
                console.error('❌ window.auth NÃO disponível');
                status.innerHTML = '❌ Erro ao carregar o Firebase. Verifique o console (F12).';
                status.style.background = '#f8d7da';
                status.style.color = '#721c24';
            }
        }, 3000);
  <!-- Adicione ANTES do fechamento do body -->
<script type="module">
    // Script de emergência para testar diretamente
    import { auth, db } from './firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    console.log('🚨 Script de emergência carregado');
    
    // Tentar login automático com as credenciais do teste
    try {
        const result = await signInWithEmailAndPassword(auth, 'akagaipora@gmail.com', '123456');
        console.log('✅ Login automático bem-sucedido!', result.user.uid);
    } catch (error) {
        console.error('❌ Login automático falhou:', error.message);
    }
    </script>
    
</body>
</html>
