<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caça ao Tesouro</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

    <div class="card" id="loginBox">

        <h2>Equipe</h2>

        <input
            type="text"
            id="nomeEquipe"
            placeholder="Nome da Equipe">

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="senha"
            placeholder="Senha">

        <button id="btnCadastro">
            Criar Equipe
        </button>

        <br><br>

        <button id="btnLogin">
            Entrar
        </button>

    </div>

    <div id="jogo" style="display:none;">

        <div class="card">

            <h2 id="tituloEtapa"></h2>

            <span
            id="numeroEtapa"
            class="badge"></span>

        </div>

        <div class="card">

            <img
            id="imagemDica"
            style="display:none">

            <p id="textoEnigma"></p>

        </div>

        <div
        class="card"
        id="validacaoArea">

        </div>

        <div class="card">

            <h3>Histórico</h3>

            <ul id="historico"></ul>

        </div>

    </div>

</div>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/game.js"></script>

</body>
</html>
