<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caça ao Tesouro</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {
                "html5-qrcode": "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"
            }
        }
    </script>
</head>
<body>
    <!-- Tela de Login -->
    <div id="loginScreen" class="screen active">
        <div class="container">
            <h1>🏴‍☠️ Caça ao Tesouro</h1>
            <div id="authForm">
                <input type="email" id="emailInput" placeholder="E-mail da equipe" required>
                <input type="password" id="passwordInput" placeholder="Senha" required>
                <div class="button-group">
                    <button onclick="window.auth.login()">Entrar</button>
                    <button onclick="window.auth.register()" class="secondary">Criar Equipe</button>
                </div>
                <div id="authMessage" class="message"></div>
            </div>
        </div>
    </div>

    <!-- Tela do Jogo -->
    <div id="gameScreen" class="screen">
        <div class="container">
            <header>
                <h2 id="teamName">Equipe: ---</h2>
                <button onclick="window.auth.logout()" class="logout-btn">Sair</button>
            </header>
            
            <div id="gameContent">
                <div id="stepInfo">
                    <div class="step-badge">Etapa <span id="currentStep">1</span></div>
                    <h3 id="stepTitle">Carregando...</h3>
                </div>
                
                <div id="puzzleContent">
                    <p id="puzzleText">Carregando enigma...</p>
                    <div id="puzzleImage"></div>
                </div>

                <div id="validationArea">
                    <!-- Renderizado dinamicamente -->
                </div>

                <div id="gameMessage" class="message"></div>
            </div>
        </div>
    </div>

    <!-- Tela de Banimento -->
    <div id="bannedScreen" class="screen">
        <div class="container">
            <h1>⛔ Acesso Negado</h1>
            <p>Sua equipe foi desativada. Entre em contato com o administrador.</p>
            <button onclick="window.auth.logout()">Sair</button>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
